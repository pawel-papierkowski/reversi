<div class="cell-content" (click)="cellClick()">
  @if (cell().state === 0) { <!-- Unknown -->
    <reversi-piece-unknown /> <!-- indicates error -->
  }

  <!-- cell().state === 1 - Empty does not show anything. -->

  @if (cell().state === 2 || cell().state === 3) { <!-- Black or white piece -->
    <!-- Passes the enum down, triggering the flip automatically if it changes. -->
    <reversi-piece [state]="cell().state" />
  }
</div>
