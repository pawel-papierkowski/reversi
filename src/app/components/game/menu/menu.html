<div class="menu-wrapper">
  <div class="menu">
    @if (canShowNextRound()) {
      <button data-testid="btn-nextRound" (click)="nextRound()">
        {{ 'game.btn.nextRound' | translate }}
      </button>
    }

    <button data-testid="btn-backToMenu" (click)="backToMenu()">
      {{ 'game.btn.backToMenu' | translate }}
    </button>
  </div>
</div>
