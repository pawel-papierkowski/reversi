<div [class]="resolveMainClass()" [style.min-width]="minWidth()"
     tabindex="0" (blur)="isOpen.set(false)">

  <div class="selected" (click)="openList()">
    <span class="selected-text">
      {{ selectedOption() === null ? (placeholder() | translate) : (langPrefix()+'.'+selectedOption() | translate) }}
    </span>
    <span class="arrow" [class]="arrowClass()"></span>
  </div>

  @if (isOpen()) {
    <div class="options">
    @for (option of options(); track option) {
      <div class="option" (click)="selectOption(option)">
        {{ langPrefix()+'.'+option | translate }}
      </div>
    }
    </div>
  }
</div>
