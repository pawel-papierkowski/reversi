<header>
  <h1>{{ 'app.title' | translate }}</h1>
  <div class="menu">
    <label for="language">{{'app.language' | translate}}:</label>
    <combo-box id="language" langPrefix="app.language" [options]="languages"
      [(selectedOption)]="selLang" />
  </div>
</header>

<main class="main">
  <router-outlet />
</main>

<footer>
    <p>{{ 'app.repository' | translate }}: <a href="https://github.com/pawel-papierkowski/reversi" target="_blank">https://github.com/pawel-papierkowski/reversi</a></p>
    <p>&copy; {{ projectProp.dateRange }} {{ projectProp.author }} | v. {{ projectProp.version }} {{ projectProp.build }}</p>
</footer>
